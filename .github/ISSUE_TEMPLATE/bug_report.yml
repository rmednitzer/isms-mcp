name: Bug report
description: Report a bug in the MCP server, tools, or workspace access layer.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill in the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behaviour.
      placeholder: |
        1. Configure Claude Desktop with `ISMS_MCP_WORKSPACE=...`
        2. Invoke tool `...`
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What you expected to happen.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: isms-mcp version
      placeholder: "0.1.0"

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12"

  - type: input
    id: transport
    attributes:
      label: Transport
      placeholder: "stdio or http"

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Ubuntu 24.04"
